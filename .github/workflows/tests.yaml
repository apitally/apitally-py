name: Tests
on:
  push:
    branches:
      - main
      - v1
    paths-ignore:
      - .gitignore
      - LICENSE
      - README.md
  pull_request:
  schedule:
    - cron: "0 0,12 * * *" # 10am and 10pm AEST
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.25"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-groups --all-extras --frozen
      - name: Run checks
        run: uv run make check
      - name: Run tests and create coverage report
        run: uv run make test-coverage
      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        deps:
          - fastapi starlette opentelemetry-instrumentation-fastapi
          - fastapi==0.108.0 starlette httpx==0.27.* opentelemetry-instrumentation-fastapi
          - starlette opentelemetry-instrumentation-starlette
          - starlette==0.29.0 httpx==0.27.* opentelemetry-instrumentation-starlette
          - flask opentelemetry-instrumentation-flask
          - flask==2.3.* opentelemetry-instrumentation-flask
          - flask==2.0.3 Werkzeug==2.* opentelemetry-instrumentation-flask
          - django opentelemetry-instrumentation-django
          - django==3.2.* opentelemetry-instrumentation-django
          - djangorestframework django uritemplate inflection opentelemetry-instrumentation-django
          - djangorestframework django==4.2.* uritemplate inflection opentelemetry-instrumentation-django
          - djangorestframework==3.12.* django==3.2.* uritemplate opentelemetry-instrumentation-django
          - django-ninja django opentelemetry-instrumentation-django
          - django-ninja==1.5.1 django==6.* opentelemetry-instrumentation-django
          - django-ninja==1.4.5 django==5.* opentelemetry-instrumentation-django
          - django-ninja==1.0.0 django==4.* opentelemetry-instrumentation-django
          - litestar opentelemetry-instrumentation-asgi
          - litestar==2.24.0 opentelemetry-instrumentation-asgi
          - blacksheep opentelemetry-instrumentation-asgi
          - blacksheep==2.6.1 opentelemetry-instrumentation-asgi
        exclude:
          - python: "3.10"
            deps: django-ninja==1.5.1 django==6.* opentelemetry-instrumentation-django
          - python: "3.11"
            deps: django-ninja==1.5.1 django==6.* opentelemetry-instrumentation-django
          - python: "3.12"
            deps: django==3.2.* opentelemetry-instrumentation-django
          - python: "3.12"
            deps: djangorestframework==3.12.* django==3.2.* uritemplate opentelemetry-instrumentation-django
          - python: "3.13"
            deps: django==3.2.* opentelemetry-instrumentation-django
          - python: "3.13"
            deps: djangorestframework==3.12.* django==3.2.* uritemplate opentelemetry-instrumentation-django
          - python: "3.14"
            deps: flask==2.0.3 Werkzeug==2.* opentelemetry-instrumentation-flask
          - python: "3.14"
            deps: django==3.2.* opentelemetry-instrumentation-django
          - python: "3.14"
            deps: djangorestframework==3.12.* django==3.2.* uritemplate opentelemetry-instrumentation-django
          - python: "3.14"
            deps: django-ninja==1.0.0 django==4.* opentelemetry-instrumentation-django
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.25"
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ matrix.python }}
      - name: Install test dependencies
        run: uv sync --no-install-project --only-group test-base --frozen
      - name: Install app dependencies
        run: uv pip install ${{ matrix.deps }} .
      - name: Run tests
        run: uv run make test
        env:
          UV_NO_SYNC: "1"

  ci-gate:
    needs:
      - test-coverage
      - test-matrix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed or skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
