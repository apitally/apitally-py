name: Tests
on:
  push:
    branches:
      - main
      - v1
    paths-ignore:
      - .gitignore
      - LICENSE
      - README.md
  pull_request:
  schedule:
    - cron: "0 0,12 * * *" # 10am and 10pm AEST
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.25"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-groups --all-extras --frozen
      - name: Run checks
        run: uv run make check
      - name: Run tests and create coverage report
        run: uv run make test-coverage
      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test-matrix:
    name: test-matrix (${{ matrix.python }}, ${{ matrix.scenario }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.12", "3.14"]
        scenario:
          - fastapi
          - fastapi-0.108
          - starlette
          - starlette-0.29
          - flask
          - flask-2.3
          - flask-2.0
          - django
          - django-3.2
          - django-rest-framework
          - django-4.2-rest-framework
          - django-3.2-rest-framework-3.12
          - django-ninja
          - django-6-ninja-1.5
          - django-5-ninja-1.4
          - django-4-ninja-1.0
          - litestar
          - litestar-2.24
          - blacksheep
          - blacksheep-2.6
        include:
          - scenario: fastapi
            extra: fastapi
            packages: ""
          - scenario: fastapi-0.108
            extra: fastapi
            packages: fastapi==0.108.0 httpx==0.27.*
          - scenario: starlette
            extra: starlette
            packages: opentelemetry-instrumentation-starlette
          - scenario: starlette-0.29
            extra: starlette
            packages: starlette==0.29.0 httpx==0.27.* opentelemetry-instrumentation-starlette
          - scenario: flask
            extra: flask
            packages: ""
          - scenario: flask-2.3
            extra: flask
            packages: flask==2.3.*
          - scenario: flask-2.0
            extra: flask
            packages: flask==2.0.3 Werkzeug==2.*
          - scenario: django
            extra: django
            packages: ""
          - scenario: django-3.2
            extra: django
            packages: django==3.2.*
          - scenario: django-rest-framework
            extra: django
            packages: djangorestframework
          - scenario: django-4.2-rest-framework
            extra: django
            packages: django==4.2.* djangorestframework
          - scenario: django-3.2-rest-framework-3.12
            extra: django
            packages: django==3.2.* djangorestframework==3.12.*
          - scenario: django-ninja
            extra: django
            packages: django-ninja
          - scenario: django-6-ninja-1.5
            extra: django
            packages: django==6.* django-ninja==1.5.1
          - scenario: django-5-ninja-1.4
            extra: django
            packages: django==5.* django-ninja==1.4.5
          - scenario: django-4-ninja-1.0
            extra: django
            packages: django==4.* django-ninja==1.0.0
          - scenario: litestar
            extra: litestar
            packages: ""
          - scenario: litestar-2.24
            extra: litestar
            packages: litestar==2.24.0
          - scenario: blacksheep
            extra: blacksheep
            packages: ""
          - scenario: blacksheep-2.6
            extra: blacksheep
            packages: blacksheep==2.6.1
          - scenario: fastapi-otel-1.42
            python: "3.14"
            extra: fastapi
            packages: >-
              opentelemetry-api==1.42.0
              opentelemetry-sdk==1.42.0
              opentelemetry-exporter-otlp-proto-common==1.42.0
              opentelemetry-instrumentation==0.63b0
              opentelemetry-instrumentation-asgi==0.63b0
              opentelemetry-instrumentation-fastapi==0.63b0
              opentelemetry-instrumentation-logging==0.63b0
              opentelemetry-instrumentation-system-metrics==0.63b0
              opentelemetry-test-utils==0.63b0
          - scenario: flask-otel-1.42
            python: "3.14"
            extra: flask
            packages: >-
              opentelemetry-api==1.42.0
              opentelemetry-sdk==1.42.0
              opentelemetry-exporter-otlp-proto-common==1.42.0
              opentelemetry-instrumentation==0.63b0
              opentelemetry-instrumentation-flask==0.63b0
              opentelemetry-instrumentation-logging==0.63b0
              opentelemetry-instrumentation-system-metrics==0.63b0
              opentelemetry-test-utils==0.63b0
          - scenario: django-rest-framework-otel-1.42
            python: "3.14"
            extra: django
            packages: >-
              djangorestframework
              opentelemetry-api==1.42.0
              opentelemetry-sdk==1.42.0
              opentelemetry-exporter-otlp-proto-common==1.42.0
              opentelemetry-instrumentation==0.63b0
              opentelemetry-instrumentation-asgi==0.63b0
              opentelemetry-instrumentation-django[asgi]==0.63b0
              opentelemetry-instrumentation-logging==0.63b0
              opentelemetry-instrumentation-system-metrics==0.63b0
              opentelemetry-test-utils==0.63b0
        exclude:
          - scenario: django-6-ninja-1.5
            python: "3.10"
          - scenario: django-3.2
            python: "3.12"
          - scenario: django-3.2-rest-framework-3.12
            python: "3.12"
          - scenario: flask-2.0
            python: "3.14"
          - scenario: django-3.2
            python: "3.14"
          - scenario: django-3.2-rest-framework-3.12
            python: "3.14"
          - scenario: django-4-ninja-1.0
            python: "3.14"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.25"
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ matrix.python }}
      - name: Install test dependencies
        run: uv sync --no-install-project --only-group test-base --frozen
      - name: Install app dependencies
        run: uv pip install ".[${{ matrix.extra }}]" ${{ matrix.packages }}
      - name: Run tests
        run: uv run make test
        env:
          UV_NO_SYNC: "1"

  ci-gate:
    needs:
      - test-coverage
      - test-matrix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed or skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
